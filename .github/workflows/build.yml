name: Build Веха

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & publish Windows
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            npm run release -- --win --x64
          } else {
            npm run build
          }
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/latest.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Convert icon to PNG
        run: |
          sudo apt-get install -y imagemagick
          convert src/assets/logo.jpg src/assets/logo.png

      - name: Build & publish Linux
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            npm run release -- --linux --x64
          else
            npm run build:linux
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/latest-linux.yml

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all builds
        uses: actions/download-artifact@v4

      - name: Verify release assets
        run: |
          echo "=== Windows ===" && ls windows-build/
          echo "=== Linux ===" && ls linux-build/
